name: Publish Snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-snapshot
  cancel-in-progress: false

jobs:
  publish:
    name: Publish snapshot to Maven Central
    runs-on: macOS-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure project version is a snapshot
        run: grep -q 'val versionName = ".*-SNAPSHOT"' build.gradle.kts

      - name: Publish snapshot to Maven Central
        run: ./gradlew publishToMavenCentral --parallel --no-configuration-cache --refresh-dependencies
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
